<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Releashion</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f6f3ec;
    --card-bg: #fffdf8;
    --text: #2a2621;
    --text-sub: #8a7d68;
    --accent: #a3812f;
    --accent-hover: #866a26;
    --border: #e6dcc4;
    --danger: #8c3a3a;
    --shadow: 0 2px 14px rgba(64, 48, 16, 0.07);
    --shadow-lg: 0 12px 40px rgba(40, 30, 10, 0.16);
    --font-serif: "Hiragino Mincho ProN", "Yu Mincho", YuMincho, serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #15130f;
      --card-bg: #201c15;
      --text: #efe7d8;
      --text-sub: #a89b83;
      --accent: #d3ac63;
      --accent-hover: #e0be7c;
      --border: #3b3324;
      --shadow: 0 2px 16px rgba(0, 0, 0, 0.35);
      --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.5);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    letter-spacing: 0.01em;
  }
  header {
    padding: 40px 20px 20px;
    max-width: 960px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-family: var(--font-serif);
    font-size: 30px;
    font-weight: 600;
    letter-spacing: 0.06em;
    margin: 0 0 8px;
    color: var(--text);
    background: linear-gradient(120deg, var(--accent), var(--text) 65%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header p {
    margin: 0;
    color: var(--text-sub);
    font-size: 12.5px;
    letter-spacing: 0.02em;
  }
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 20px 60px;
  }
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 16px 0;
  }
  .search-input {
    flex: 1;
    min-width: 140px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    font-size: 14px;
  }
  .btn {
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 0.03em;
    transition: background-color .15s ease, border-color .15s ease, transform .1s ease;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px rgba(163, 129, 47, 0.35);
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-ghost {
    background: transparent;
    color: var(--text-sub);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }

  .sync-bar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    font-size: 12.5px;
    color: var(--text-sub);
    letter-spacing: 0.02em;
  }
  .events-section { margin-top: 8px; }
  .events-title {
    font-family: var(--font-serif);
    font-size: 16px;
    letter-spacing: 0.03em;
    margin: 0 0 12px;
  }
  .events-list {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 6px;
  }
  .event-card {
    flex: 0 0 auto;
    width: 120px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 4px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .event-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
  .event-card .avatar, .event-card .avatar-placeholder {
    width: 56px;
    height: 56px;
    font-size: 20px;
  }
  .event-card .name { font-weight: 600; font-size: 13px; margin-top: 2px; }
  .event-when { font-size: 11px; color: var(--accent); font-weight: 600; letter-spacing: 0.02em; }
  .event-age { font-size: 11px; color: var(--text-sub); }

  .groups-container {
    display: flex;
    flex-direction: column;
    gap: 32px;
    margin-top: 20px;
  }
  .group-heading {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    font-family: var(--font-serif);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding-bottom: 10px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--accent);
  }
  .group-count {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: var(--text-sub);
    letter-spacing: normal;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 6px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--accent); }
  .avatar {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--bg);
    border: 1px solid var(--accent);
  }
  .avatar-placeholder {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: var(--text-sub);
  }
  .card .name { font-family: var(--font-serif); font-weight: 600; font-size: 15.5px; margin-top: 4px; letter-spacing: 0.02em; }
  .card .meta { font-size: 12px; color: var(--text-sub); }

  .empty-state {
    text-align: center;
    color: var(--text-sub);
    padding: 60px 20px;
    font-size: 14px;
    letter-spacing: 0.02em;
  }

  /* Modal */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20, 16, 8, 0.55);
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 10;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 28px;
    width: 100%;
    max-width: 420px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
  }
  .modal h2 {
    font-family: var(--font-serif);
    margin: 0 0 16px;
    font-size: 19px;
    letter-spacing: 0.03em;
  }
  .photo-upload {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .photo-upload .avatar, .photo-upload .avatar-placeholder {
    width: 100px;
    height: 100px;
    cursor: pointer;
  }
  .photo-upload input[type=file] { display: none; }
  .photo-upload .hint { font-size: 12px; color: var(--text-sub); }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 60px; }
  .two-col { display: flex; gap: 8px; }
  .autocomplete { position: relative; width: 100%; }
  .two-col .autocomplete { flex: 1; min-width: 0; }
  .two-col > input, .two-col > select { flex: 1; min-width: 0; width: auto; }
  .autocomplete-list {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    max-height: 220px;
    overflow-y: auto;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    z-index: 20;
  }
  .autocomplete-list.open { display: block; }
  .autocomplete-item {
    padding: 8px 12px;
    font-size: 14px;
    cursor: pointer;
  }
  .autocomplete-item:hover, .autocomplete-item.active { background: var(--bg); }
  .autocomplete-empty {
    padding: 8px 12px;
    font-size: 13px;
    color: var(--text-sub);
  }

  .field-row { display: flex; gap: 8px; }
  .field-row input[type="text"] { flex: 1; min-width: 0; }
  .field-row .icon-btn { flex: none; padding: 10px 12px; }

  .modal-actions {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-top: 20px;
  }
  .modal-actions .right { display: flex; gap: 8px; }

  /* Detail page */
  .modal-detail { max-width: 560px; text-align: left; }
  .detail-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }
  .detail-header .avatar, .detail-header .avatar-placeholder {
    width: 72px;
    height: 72px;
    flex-shrink: 0;
  }
  .detail-title { flex: 1; min-width: 0; }
  .detail-title h2 {
    font-family: var(--font-serif);
    margin: 0 0 6px;
    font-size: 20px;
    letter-spacing: 0.03em;
    word-break: break-word;
  }
  .detail-header-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }
  .detail-section { margin-bottom: 22px; }
  .detail-section h3 {
    font-size: 12px;
    color: var(--text-sub);
    margin: 0 0 8px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .info-row {
    display: flex;
    gap: 10px;
    font-size: 14px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
  }
  .info-row:last-child { border-bottom: none; }
  .info-block {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .info-block:last-child { border-bottom: none; }
  .info-block > .info-label { display: block; margin-bottom: 8px; }
  .info-label {
    width: 84px;
    flex-shrink: 0;
    color: var(--text-sub);
    font-size: 12px;
    padding-top: 1px;
  }
  .info-value { white-space: pre-wrap; word-break: break-word; }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .chip {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 5px 8px 5px 12px;
    border-radius: 20px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .chip button {
    border: none;
    background: none;
    color: var(--text-sub);
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    padding: 2px;
  }
  .chips-empty { font-size: 13px; color: var(--text-sub); margin-bottom: 10px; }
  .timeline-empty { font-size: 13px; color: var(--text-sub); margin-bottom: 10px; }
  .timeline {
    display: flex;
    align-items: flex-start;
    gap: 30px;
    overflow-x: scroll;
    padding: 18px 10px 14px;
    margin: 0 -10px 0;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .timeline::-webkit-scrollbar {
    display: none;
  }
  .timeline-scrollbar-track {
    position: relative;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    margin: 0 0 14px;
    cursor: pointer;
  }
  .timeline-scrollbar-thumb {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    background: var(--accent);
    border-radius: 3px;
    cursor: grab;
  }
  .timeline-scrollbar-thumb:active { cursor: grabbing; }
  .timeline-item {
    position: relative;
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 15px;
  }
  .timeline-item::before {
    content: '';
    position: absolute;
    top: 4px;
    left: -15px;
    right: -15px;
    height: 1px;
    background: var(--border);
  }
  .timeline-item:first-child::before { left: 4px; }
  .timeline-dot {
    position: absolute;
    top: 0;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--card-bg);
  }
  .timeline-vertical-text {
    display: flex;
    flex-direction: row-reverse;
    gap: 10px;
    align-items: flex-start;
    min-height: 100px;
    margin-bottom: 10px;
  }
  .timeline-year, .timeline-title {
    writing-mode: vertical-rl;
    text-orientation: upright;
    white-space: nowrap;
  }
  .timeline-year {
    font-family: var(--font-serif);
    font-weight: 700;
    color: var(--accent);
    font-size: 12.5px;
    letter-spacing: 0.1em;
  }
  .timeline-title {
    font-size: 13.5px;
    letter-spacing: 0.06em;
  }
  .timeline-remove {
    border: none;
    background: none;
    color: var(--text-sub);
    cursor: pointer;
    font-size: 13px;
    padding: 2px;
  }
  .detail-textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    min-height: 70px;
  }
  .add-row { display: flex; flex-direction: column; gap: 8px; }
  .add-row input, .add-row select {
    width: 100%;
    padding: 9px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
  }
  .add-row button { align-self: flex-end; }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 8px;
    margin-bottom: 10px;
  }
  .photo-item { position: relative; }
  .photo-grid img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid var(--border);
  }
  .photo-remove {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-sub);
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow);
  }
  .photo-remove:hover { color: var(--danger); }
  .detail-header .avatar { cursor: pointer; }
  .lightbox-content {
    max-width: 90vw;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .lightbox-content img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 10px;
    box-shadow: var(--shadow-lg);
  }
  .detail-footer {
    margin-top: 10px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    text-align: right;
  }
  #galleryInput { display: none; }
  .group-tag {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.05em;
    background: var(--accent);
    color: #fff;
    padding: 3px 10px;
    border-radius: 20px;
  }
</style>
</head>
<body>

<header>
  <h1>Releashion</h1>
  <p>写真・名前・生年月日・家族構成などを記録しておける名簿です（データはこの端末のブラウザ内に保存されます）</p>
</header>

<main>
  <div class="sync-bar">
    <span class="sync-status" id="syncStatus">未同期（この端末のみ）</span>
    <button type="button" class="btn btn-ghost" id="googleSignInBtn">Googleでログインして同期</button>
    <button type="button" class="btn btn-ghost" id="googleSignOutBtn" style="display:none;">ログアウト</button>
  </div>

  <div class="events-section" id="eventsSection" style="display:none;">
    <h2 class="events-title">🎉 近づいているお祝い事</h2>
    <div class="events-list" id="eventsList"></div>
  </div>

  <div class="toolbar">
    <input class="search-input" id="searchInput" type="text" placeholder="名前で検索…">
    <button class="btn btn-primary" id="addBtn">＋ 追加</button>
    <button class="btn btn-ghost" id="exportBtn">⬇ 書き出し</button>
    <button class="btn btn-ghost" id="importBtn">⬆ 読み込み</button>
    <input type="file" id="importFileInput" accept="application/json,.json" style="display:none;">
  </div>

  <div class="groups-container" id="grid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    まだ登録がありません。「＋ 追加」から最初の人を登録しましょう。
  </div>
</main>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">新しく追加</h2>
    <form id="personForm">
      <div class="photo-upload">
        <div id="photoPreviewWrap">
          <div class="avatar-placeholder" id="photoPlaceholder">📷</div>
          <img class="avatar" id="photoPreview" style="display:none;">
        </div>
        <input type="file" id="photoInput" accept="image/*">
        <button type="button" class="btn btn-ghost" id="photoPickBtn">写真を選択</button>
        <div class="hint">タップして写真を追加（任意）</div>
      </div>

      <div class="field">
        <label for="nameInput">名前 *</label>
        <input type="text" id="nameInput" required placeholder="例）山田 太郎">
      </div>

      <div class="field">
        <label for="birthdateInput">生年月日</label>
        <input type="date" id="birthdateInput">
      </div>

      <div class="field">
        <label for="groupInput">グループ</label>
        <input type="text" id="groupInput" list="groupList" placeholder="例）家族、友人、仕事関係">
        <datalist id="groupList">
          <option value="家族">
          <option value="親戚">
          <option value="友人">
          <option value="仕事関係">
          <option value="その他">
        </datalist>
      </div>

      <div class="field">
        <label for="hometownInput">出身地</label>
        <div class="autocomplete">
          <input type="text" id="hometownInput" placeholder="都道府県を入力（かな可）" autocomplete="off">
          <div class="autocomplete-list" id="hometownList"></div>
        </div>
      </div>

      <div class="field">
        <label for="residencePrefInput">住まい</label>
        <div class="two-col">
          <div class="autocomplete">
            <input type="text" id="residencePrefInput" placeholder="都道府県" autocomplete="off">
            <div class="autocomplete-list" id="residencePrefList"></div>
          </div>
          <div class="autocomplete">
            <input type="text" id="residenceCityInput" placeholder="市区町村" autocomplete="off">
            <div class="autocomplete-list" id="residenceCityList"></div>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="highSchoolInput">出身高校</label>
        <div class="field-row">
          <input type="text" id="highSchoolInput" placeholder="例）〇〇高等学校">
          <button type="button" class="btn btn-ghost icon-btn" id="highSchoolSearchBtn" title="偏差値を調べる">🔍</button>
        </div>
      </div>

      <div class="field">
        <label for="universityInput">大学・専攻</label>
        <div class="field-row">
          <input type="text" id="universityInput" placeholder="例）〇〇大学 〇〇学部">
          <button type="button" class="btn btn-ghost icon-btn" id="universitySearchBtn" title="偏差値を調べる">🔍</button>
        </div>
      </div>

      <div class="field">
        <label for="currentJobInput">現在の職場</label>
        <input type="text" id="currentJobInput" placeholder="例）〇〇株式会社">
      </div>

      <div class="field">
        <label for="bestMemoryInput">最高の思い出</label>
        <textarea id="bestMemoryInput" placeholder="一緒に過ごした忘れられないエピソードなど"></textarea>
      </div>

      <div class="field">
        <label for="memoInput">メモ</label>
        <textarea id="memoInput" placeholder="連絡先など自由に"></textarea>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-danger" id="deleteBtn" style="display:none;">削除</button>
        <div class="right">
          <button type="button" class="btn btn-ghost" id="cancelBtn">キャンセル</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="overlay" id="detailOverlay">
  <div class="modal modal-detail">
    <div class="detail-header">
      <div id="detailPhotoWrap"></div>
      <div class="detail-title">
        <h2 id="detailName"></h2>
        <div class="group-tag" id="detailGroupTag"></div>
      </div>
      <div class="detail-header-actions">
        <button type="button" class="btn btn-ghost" id="detailEditBtn">編集</button>
        <button type="button" class="btn btn-ghost" id="detailCloseBtn">閉じる</button>
      </div>
    </div>

    <div class="detail-section">
      <h3>年表</h3>
      <div class="timeline" id="timelineList"></div>
      <div class="timeline-scrollbar-track" id="timelineScrollbarTrack">
        <div class="timeline-scrollbar-thumb" id="timelineScrollbarThumb"></div>
      </div>
      <div class="timeline-empty" id="timelineEmpty" style="display:none;">まだ登録されていません</div>
      <div class="add-row">
        <div class="two-col">
          <input type="number" id="timelineYearInput" placeholder="年（例：2000）">
          <input type="number" id="timelineDetailInput" placeholder="月（任意）" min="1" max="12">
          <input type="number" id="timelineDayInput" placeholder="日（任意）" min="1" max="31">
        </div>
        <input type="text" id="timelineTitleInput" placeholder="できごと（例：結婚）">
        <button type="button" class="btn btn-ghost" id="addTimelineBtn">追加</button>
      </div>
    </div>

    <div class="detail-section">
      <h3>現状の情報</h3>
      <div class="info-row"><span class="info-label">グループ</span><span class="info-value" id="detailGroupText"></span></div>
      <div class="info-row"><span class="info-label">生年月日</span><span class="info-value" id="detailBirthdate"></span></div>
      <div class="info-row"><span class="info-label">出身地</span><span class="info-value" id="detailHometown"></span></div>
      <div class="info-row"><span class="info-label">住まい</span><span class="info-value" id="detailResidence"></span></div>
      <div class="info-row"><span class="info-label">出身高校</span><span class="info-value" id="detailHighSchool"></span></div>
      <div class="info-row"><span class="info-label">大学・専攻</span><span class="info-value" id="detailUniversity"></span></div>
      <div class="info-row"><span class="info-label">現在の職場</span><span class="info-value" id="detailCurrentJob"></span></div>
      <div class="info-row"><span class="info-label">最高の思い出</span><span class="info-value" id="detailBestMemory"></span></div>
      <div class="info-row"><span class="info-label">メモ</span><span class="info-value" id="detailMemo"></span></div>
    </div>

    <div class="detail-section">
      <div class="info-block">
        <span class="info-label">家族構成</span>
        <div class="field" style="margin-bottom:10px;">
          <label for="detailBirthOrderInput">本人の続柄</label>
          <select id="detailBirthOrderInput">
            <option value="">未設定</option>
            <option value="長男">長男</option>
            <option value="長女">長女</option>
            <option value="次男">次男</option>
            <option value="次女">次女</option>
            <option value="三男">三男</option>
            <option value="三女">三女</option>
            <option value="四男">四男</option>
            <option value="四女">四女</option>
            <option value="五男">五男</option>
            <option value="五女">五女</option>
            <option value="一人っ子">一人っ子</option>
          </select>
        </div>
        <div class="chips" id="siblingsChips"></div>
        <div class="add-row">
          <div class="two-col">
            <select id="siblingTypeInput">
              <option value="兄">兄</option>
              <option value="姉">姉</option>
              <option value="弟">弟</option>
              <option value="妹">妹</option>
            </select>
            <input type="number" id="siblingDiffInput" placeholder="何個上/下か（歳・任意）" min="0">
          </div>
          <button type="button" class="btn btn-ghost" id="addSiblingBtn">兄弟を追加</button>
        </div>
        <textarea class="detail-textarea" id="detailFamilyInput" placeholder="例）配偶者：花子、長男：一郎（10歳）、長女：花（8歳）"></textarea>
      </div>

      <div class="info-block">
        <span class="info-label">好きなもの</span>
        <div class="chips" id="likesChips"></div>
        <div class="add-row">
          <input type="text" id="likeInput" placeholder="好きなものを追加（例：コーヒー）">
          <button type="button" class="btn btn-ghost" id="addLikeBtn">追加</button>
        </div>
      </div>
    </div>

    <div class="detail-section">
      <h3>写真</h3>
      <div class="photo-grid" id="photoGrid"></div>
      <input type="file" id="galleryInput" accept="image/*" multiple>
      <button type="button" class="btn btn-ghost" id="addPhotoBtn">＋ 写真を追加</button>
    </div>

    <div class="detail-footer">
      <button type="button" class="btn btn-danger" id="detailDeleteBtn">この人物を削除</button>
    </div>
  </div>
</div>

<div class="overlay" id="lightboxOverlay">
  <div class="lightbox-content">
    <img id="lightboxImg" src="">
    <button type="button" class="btn btn-ghost" id="lightboxCloseBtn">閉じる</button>
  </div>
</div>

  function initGoogleAuth() {
    if (!GOOGLE_SYNC_ENABLED) {
      setSyncStatus('Drive同期は未設定です');
      googleSignInBtn.disabled = true;
      return;
    }
    if (typeof google === 'undefined' || !google.accounts) {
      setTimeout(initGoogleAuth, 300);
      return;
    }
    driveTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/drive.file',
      callback: async (tokenResponse) => {
        if (tokenResponse.error) {
          if (!driveSilentAttempt) {
            setSyncStatus('ログインに失敗しました');
          }
          driveSilentAttempt = false;
          return;
        }
        driveSilentAttempt = false;
        driveAccessToken = tokenResponse.access_token;
        localStorage.setItem(DRIVE_SIGNED_IN_BEFORE_KEY, 'true');
        updateSyncUI(true);
        setSyncStatus('同期中…');
        await loadFromDrive();
      }
    });

    if (localStorage.getItem(DRIVE_SIGNED_IN_BEFORE_KEY) === 'true') {
      driveSilentAttempt = true;
      driveTokenClient.requestAccessToken({ prompt: '' });
    }
  }

  async function findDriveFile() {
    const query = `name='${DRIVE_FILE_NAME}' and trashed=false`;
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&spaces=drive&fields=files(id,name)`,
      { headers: { Authorization: `Bearer ${driveAccessToken}` } }
    );
    const data = await res.json();
    return (data.files && data.files[0]) ? data.files[0].id : null;
  }

  async function createDriveFile(initialData) {
    const metadata = { name: DRIVE_FILE_NAME, mimeType: 'application/json' };
    const boundary = 'relmgr-boundary-314159265';
    const delimiter = `\r\n--${boundary}\r\n`;
    const closeDelim = `\r\n--${boundary}--`;
    const body =
      delimiter + 'Content-Type: application/json\r\n\r\n' + JSON.stringify(metadata) +
      delimiter + 'Content-Type: application/json\r\n\r\n' + JSON.stringify(initialData) +
      closeDelim;
    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: {
        Authorization: `Bearer ${driveAccessToken}`,
        'Content-Type': `multipart/related; boundary=${boundary}`
      },
      body
    });
    const data = await res.json();
    return data.id;
  }

  function mergePeopleData(localList, remoteList, mergedDeletedIds) {
    const merged = new Map();
    remoteList.forEach(p => merged.set(p.id, p));
    localList.forEach(p => {
      const existing = merged.get(p.id);
      if (!existing || (p.updatedAt || 0) >= (existing.updatedAt || 0)) {
        merged.set(p.id, p);
      }
    });
    mergedDeletedIds.forEach(id => merged.delete(id));
    return Array.from(merged.values());
  }

  async function loadFromDrive() {
    try {
      let fileId = await findDriveFile();
      if (!fileId) {
        fileId = await createDriveFile({ people, deletedIds: Array.from(deletedIds) });
        driveFileId = fileId;
        setSyncStatus(`同期済み（${new Date().toLocaleTimeString('ja-JP')}）`);
        return;
      }
      driveFileId = fileId;
      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
        headers: { Authorization: `Bearer ${driveAccessToken}` }
      });
      const remoteRaw = await res.json();
      const remotePayload = Array.isArray(remoteRaw) ? { people: remoteRaw, deletedIds: [] } : (remoteRaw || {});
      const remotePeople = Array.isArray(remotePayload.people) ? remotePayload.people : [];
      const remoteDeletedIds = Array.isArray(remotePayload.deletedIds) ? remotePayload.deletedIds : [];

      remotePeople.forEach(ensurePersonDefaults);

      const mergedDeletedIds = new Set([...deletedIds, ...remoteDeletedIds]);
      const merged = mergePeopleData(people, remotePeople, mergedDeletedIds);

      people = merged;
      deletedIds = mergedDeletedIds;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(people));
      saveDeletedIds();
      render();

      const remoteDeletedIdsSet = new Set(remoteDeletedIds);
      const deletedIdsUpToDate = mergedDeletedIds.size === remoteDeletedIdsSet.size &&
        Array.from(mergedDeletedIds).every(id => remoteDeletedIdsSet.has(id));
      const peopleUpToDate = merged.length === remotePeople.length &&
        merged.every(p => {
          const r = remotePeople.find(x => x.id === p.id);
          return r && JSON.stringify(r) === JSON.stringify(p);
        });
      const remoteUpToDate = peopleUpToDate && deletedIdsUpToDate;
      if (!remoteUpToDate) {
        await pushToDrive();
      } else {
        setSyncStatus(`同期済み（${new Date().toLocaleTimeString('ja-JP')}）`);
      }
    } catch (err) {
      console.error(err);
      setSyncStatus('同期エラー');
    }
  }

  async function pushToDrive() {
    if (!driveAccessToken || !driveFileId) return;
    try {
      // 上書き事故を防ぐため、送信前に必ず最新のドライブの中身を取得してから合流させる
      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`, {
        headers: { Authorization: `Bearer ${driveAccessToken}` }
      });
      const remoteRaw = await res.json();
      const remotePayload = Array.isArray(remoteRaw) ? { people: remoteRaw, deletedIds: [] } : (remoteRaw || {});
      const remotePeople = Array.isArray(remotePayload.people) ? remotePayload.people : [];
      const remoteDeletedIds = Array.isArray(remotePayload.deletedIds) ? remotePayload.deletedIds : [];
      remotePeople.forEach(ensurePersonDefaults);

      const mergedDeletedIds = new Set([...deletedIds, ...remoteDeletedIds]);
      const merged = mergePeopleData(people, remotePeople, mergedDeletedIds);

      people = merged;
      deletedIds = mergedDeletedIds;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(people));
      saveDeletedIds();
      render();

      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: {
          Authorization: `Bearer ${driveAccessToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ people, deletedIds: Array.from(deletedIds) })
      });
      setSyncStatus(`同期済み（${new Date().toLocaleTimeString('ja-JP')}）`);
    } catch (err) {
      console.error(err);
      setSyncStatus('同期エラー');
    }
  }

  function calcAge(birthdate) {
    if (!birthdate) return null;
    const b = new Date(birthdate);
    if (isNaN(b)) return null;
    const now = new Date();
    let age = now.getFullYear() - b.getFullYear();
    const m = now.getMonth() - b.getMonth();
    if (m < 0 || (m === 0 && now.getDate() < b.getDate())) age--;
    return age;
  }

  function formatBirthdate(birthdate) {

  function kataToHira(str) {
    return str.replace(/[ァ-ヶ]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));

  function normalizeForSearch(str) {
    return kataToHira(str || '').toLowerCase();

  function splitResidence(residence) {
    if (!residence) return { pref: '', city: '' };
    const pref = PREFECTURES.find(p => residence.startsWith(p));
    if (!pref) return { pref: '', city: '' };
    return { pref, city: residence.slice(pref.length) };

  function setupAutocomplete(inputEl, listEl, getOptions, onSelect) {
    let currentOptions = [];
    let activeIndex = -1;

    function renderList() {
      const q = normalizeForSearch(inputEl.value);
      currentOptions = getOptions().filter(opt => {
        if (!q) return true;
        return normalizeForSearch(opt.n).includes(q) || normalizeForSearch(opt.k).includes(q);
      }).slice(0, 30);
      activeIndex = -1;

      listEl.innerHTML = '';
      if (currentOptions.length === 0) {
        listEl.innerHTML = '<div class="autocomplete-empty">該当なし</div>';
      } else {
        currentOptions.forEach(opt => {
          const item = document.createElement('div');
          item.className = 'autocomplete-item';
          item.textContent = opt.n;
          item.addEventListener('mousedown', e => {
            e.preventDefault();
            selectOption(opt);
          });
          listEl.appendChild(item);
        });
      }
      listEl.classList.add('open');
    }

    function selectOption(opt) {
      inputEl.value = opt.n;
      listEl.classList.remove('open');
      if (onSelect) onSelect(opt);
    }

    function updateActive() {
      const items = listEl.querySelectorAll('.autocomplete-item');
      items.forEach((el, idx) => el.classList.toggle('active', idx === activeIndex));
      if (items[activeIndex]) items[activeIndex].scrollIntoView({ block: 'nearest' });
    }

    inputEl.addEventListener('focus', renderList);
    inputEl.addEventListener('input', renderList);
    inputEl.addEventListener('blur', () => {
      setTimeout(() => listEl.classList.remove('open'), 150);
    });
    inputEl.addEventListener('keydown', e => {
      if (!listEl.classList.contains('open')) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIndex = Math.min(activeIndex + 1, currentOptions.length - 1);
        updateActive();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIndex = Math.max(activeIndex - 1, 0);
        updateActive();
      } else if (e.key === 'Enter') {
        if (activeIndex >= 0 && currentOptions[activeIndex]) {
          e.preventDefault();
          selectOption(currentOptions[activeIndex]);
        }
      } else if (e.key === 'Escape') {
        listEl.classList.remove('open');
      }
    });
  }

  function buildCard(p) {
    const card = document.createElement('div');
    card.className = 'card';
    card.addEventListener('click', () => openDetail(p.id));

    const photoHtml = p.photo
      ? `<img class="avatar" src="${p.photo}">`

    const age = calcAge(p.birthdate);
    const metaParts = [];
    if (p.birthdate) metaParts.push(formatBirthdate(p.birthdate) + (age !== null ? `（${age}歳）` : ''));

    card.innerHTML = `
      ${photoHtml}
      <div class="name">${escapeHtml(p.name)}</div>
      ${metaParts.length ? `<div class="meta">${escapeHtml(metaParts.join(' '))}</div>` : ''}
    `;
    return card;
  }

  function render() {
    const query = searchInput.value.trim().toLowerCase();
    const filtered = people.filter(p => p.name.toLowerCase().includes(query));

    grid.innerHTML = '';
    emptyState.style.display = (people.length === 0) ? 'block' : 'none';

    const groups = new Map();
    filtered.forEach(p => {
      const key = (p.group || '').trim() || UNGROUPED_LABEL;
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(p);
    });

    const groupNames = Array.from(groups.keys()).sort((a, b) => {
      if (a === UNGROUPED_LABEL) return 1;
      if (b === UNGROUPED_LABEL) return -1;
      const ai = GROUP_ORDER.indexOf(a);
      const bi = GROUP_ORDER.indexOf(b);
      if (ai !== -1 && bi !== -1) return ai - bi;
      if (ai !== -1) return -1;
      if (bi !== -1) return 1;
      return a.localeCompare(b, 'ja');
    });

    groupNames.forEach(groupName => {
      const members = groups.get(groupName)
        .slice()
        .sort((a, b) => a.name.localeCompare(b.name, 'ja'));

      const section = document.createElement('div');
      section.className = 'group-section';

      const heading = document.createElement('div');
      heading.className = 'group-heading';
      heading.innerHTML = `<span>${escapeHtml(groupName)}</span><span class="group-count">${members.length}人</span>`;
      section.appendChild(heading);

      const groupGrid = document.createElement('div');
      groupGrid.className = 'grid';
      members.forEach(p => groupGrid.appendChild(buildCard(p)));
      section.appendChild(groupGrid);

      grid.appendChild(section);
    });

    renderEvents();
  }

  const MILESTONE_NAMES = {
    60: '還暦', 70: '古希', 77: '喜寿', 80: '傘寿',
    88: '米寿', 90: '卒寿', 99: '白寿', 100: '百寿'
  };
  const EVENT_WINDOW_DAYS = 30;

  function getUpcomingBirthday(birthdate, today) {
    if (!birthdate) return null;
    const b = new Date(birthdate);
    if (isNaN(b)) return null;
    const todayStripped = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    let next = new Date(todayStripped.getFullYear(), b.getMonth(), b.getDate());
    if (next < todayStripped) {
      next = new Date(todayStripped.getFullYear() + 1, b.getMonth(), b.getDate());
    }
    const daysUntil = Math.round((next - todayStripped) / 86400000);
    const turningAge = next.getFullYear() - b.getFullYear();
    return { daysUntil, turningAge };
  }

  function renderEvents() {
    const today = new Date();
    const events = people
      .map(p => {
        const info = getUpcomingBirthday(p.birthdate, today);
        return info ? { person: p, daysUntil: info.daysUntil, turningAge: info.turningAge } : null;
      })
      .filter(e => e && e.daysUntil <= EVENT_WINDOW_DAYS)
      .sort((a, b) => a.daysUntil - b.daysUntil);

    eventsList.innerHTML = '';
    eventsSection.style.display = events.length ? 'block' : 'none';

    events.forEach(e => {
      const p = e.person;
      const card = document.createElement('div');
      card.className = 'event-card';
      card.addEventListener('click', () => openDetail(p.id));

      const photoHtml = p.photo

      const whenLabel = e.daysUntil === 0 ? '今日' : `あと${e.daysUntil}日`;
      const milestone = MILESTONE_NAMES[e.turningAge];

      card.innerHTML = `
        ${photoHtml}
        <div class="name">${escapeHtml(p.name)}</div>
        <div class="event-when">${whenLabel}</div>
        <div class="event-age">${e.turningAge}歳${milestone ? `・${milestone}` : 'の誕生日'}</div>
      `;
      eventsList.appendChild(card);
    });
  }

  function resizeImage(file, callback) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > MAX_PHOTO_DIM) {
          height = Math.round(height * (MAX_PHOTO_DIM / width));
          width = MAX_PHOTO_DIM;
        } else if (height > MAX_PHOTO_DIM) {
          width = Math.round(width * (MAX_PHOTO_DIM / height));
          height = MAX_PHOTO_DIM;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        callback(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  const importFileInput = document.getElementById('importFileInput');

  document.getElementById('exportBtn').addEventListener('click', () => {
    const dataStr = JSON.stringify(people, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const stamp = new Date().toISOString().slice(0, 10);
    const a = document.createElement('a');
    a.href = url;
    a.download = `people-backup-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  document.getElementById('importBtn').addEventListener('click', () => importFileInput.click());

  importFileInput.addEventListener('change', () => {
    const file = importFileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!Array.isArray(imported)) throw new Error('invalid format');
        const ok = confirm(`${imported.length}件のデータを読み込みます。現在のこの端末のデータ（${people.length}件）は置き換えられます。よろしいですか？`);
        if (!ok) return;
        imported.forEach(ensurePersonDefaults);
        imported.forEach(p => { p.updatedAt = Date.now(); });
        people = imported;
        savePeople();
        render();
        alert('読み込みが完了しました。');
      } catch (err) {
        alert('ファイルの読み込みに失敗しました。書き出したJSONファイルを選択しているか確認してください。');
      } finally {
        importFileInput.value = '';
      }
    };
    reader.readAsText(file);
  });

  function openDeviationSearch(nameInputEl) {
    const schoolName = nameInputEl.value.trim();
    if (!schoolName) {
      nameInputEl.focus();
      return;
    }
    const url = 'https://www.google.com/search?q=' + encodeURIComponent(schoolName + ' 偏差値');
    window.open(url, '_blank', 'noopener');
  }

  highSchoolSearchBtn.addEventListener('click', () => openDeviationSearch(highSchoolInput));
  universitySearchBtn.addEventListener('click', () => openDeviationSearch(universityInput));

  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeModal();
  });

  photoInput.addEventListener('change', () => {
    const file = photoInput.files[0];
    if (!file) return;
    resizeImage(file, dataUrl => {
      pendingPhoto = dataUrl;
      photoPreview.src = dataUrl;
      photoPreview.style.display = 'block';
      photoPlaceholder.style.display = 'none';
    });
  });

  form.addEventListener('submit', e => {
    e.preventDefault();
    const name = nameInput.value.trim();
    if (!name) return;
    const residence = residencePrefInput.value ? (residencePrefInput.value + residenceCityInput.value) : '';

    if (editingId) {
      const p = people.find(x => x.id === editingId);
      p.name = name;
      p.birthdate = birthdateInput.value;
      p.group = groupInput.value.trim();
      p.hometown = hometownInput.value.trim();
      p.residence = residence;
      p.highSchool = highSchoolInput.value.trim();
      p.university = universityInput.value.trim();
      p.currentJob = currentJobInput.value.trim();
      p.bestMemory = bestMemoryInput.value.trim();
      p.memo = memoInput.value.trim();
      p.photo = pendingPhoto;
      p.updatedAt = Date.now();
    } else {
      people.push({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        name,
        birthdate: birthdateInput.value,
        group: groupInput.value.trim(),
        family: '',
        hometown: hometownInput.value.trim(),
        residence: residence,
        highSchool: highSchoolInput.value.trim(),
        university: universityInput.value.trim(),
        currentJob: currentJobInput.value.trim(),
        bestMemory: bestMemoryInput.value.trim(),
        memo: memoInput.value.trim(),
        photo: pendingPhoto,
        likes: [],
        photos: [],
        birthOrder: '',
        siblings: [],
        updatedAt: Date.now()
      });
    }

    const wasEditingId = editingId;
    savePeople();
    render();
    closeModal();
    if (returnToDetailAfterEdit && wasEditingId) {
      openDetail(wasEditingId);
    }
    returnToDetailAfterEdit = false;
  });

  document.getElementById('cancelBtn').addEventListener('click', () => {
    const wasEditingId = editingId;
    closeModal();
    if (returnToDetailAfterEdit && wasEditingId) {
      openDetail(wasEditingId);
    }
    returnToDetailAfterEdit = false;
  });

  deleteBtn.addEventListener('click', () => {
    if (!editingId) return;
    if (!confirm('この人物を削除しますか？')) return;
    markDeleted(editingId);
    people = people.filter(p => p.id !== editingId);
    savePeople();
    render();
    closeModal();
    returnToDetailAfterEdit = false;
  });

  searchInput.addEventListener('input', render);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (overlay.classList.contains('open')) closeModal();
      if (detailOverlay.classList.contains('open')) closeDetail();
    }
  });

  // --- Detail page ---

  function openDetail(id) {
    const p = people.find(x => x.id === id);
    if (!p) return;
    ensurePersonDefaults(p);
    detailId = id;
    renderDetail();
    detailOverlay.classList.add('open');
  }

  function closeDetail() {
    detailOverlay.classList.remove('open');
    detailId = null;
  }

  function renderDetail() {
    const p = people.find(x => x.id === detailId);
    if (!p) { closeDetail(); return; }
    ensurePersonDefaults(p);

    detailPhotoWrap.innerHTML = p.photo
      ? `<img class="avatar" src="${p.photo}">`
      : `<div class="avatar-placeholder">👤</div>`;
    if (p.photo) {
      detailPhotoWrap.querySelector('img').addEventListener('click', () => openLightbox(p.photo));
    }

    detailName.textContent = p.name;
    if (p.group) {
      detailGroupTag.textContent = p.group;
      detailGroupTag.style.display = 'inline-block';
    } else {
      detailGroupTag.style.display = 'none';
    }

    const age = calcAge(p.birthdate);
    detailGroupText.textContent = p.group || '未設定';
    detailBirthdate.textContent = p.birthdate
      ? formatBirthdate(p.birthdate) + (age !== null ? `（${age}歳）` : '')
      : '未設定';
    detailHometown.textContent = p.hometown || '未設定';
    detailResidence.textContent = p.residence || '未設定';
    detailHighSchool.textContent = p.highSchool || '未設定';
    detailUniversity.textContent = p.university || '未設定';
    detailCurrentJob.textContent = p.currentJob || '未設定';
    detailBestMemory.textContent = p.bestMemory || '未設定';
    detailFamilyInput.value = p.family || '';
    detailBirthOrderInput.value = p.birthOrder || '';
    detailMemo.textContent = p.memo || '未設定';

    siblingsChips.innerHTML = '';
    if (p.siblings.length === 0) {
      siblingsChips.innerHTML = '<div class="chips-empty">まだ登録されていません</div>';
    } else {
      p.siblings.forEach((sibling, idx) => {
        const chip = document.createElement('div');
        chip.className = 'chip';
        const span = document.createElement('span');
        const direction = (sibling.type === '兄' || sibling.type === '姉') ? '上' : '下';
        span.textContent = sibling.diff
          ? `${sibling.type}（${sibling.diff}個${direction}）`
          : sibling.type;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.setAttribute('aria-label', '削除');
        btn.textContent = '×';
        btn.addEventListener('click', () => {
          p.siblings.splice(idx, 1);
          p.updatedAt = Date.now();
          savePeople();
          renderDetail();
        });
        chip.appendChild(span);
        chip.appendChild(btn);
        siblingsChips.appendChild(chip);
      });
    }

    likesChips.innerHTML = '';
    if (p.likes.length === 0) {
      likesChips.innerHTML = '<div class="chips-empty">まだ登録されていません</div>';
    } else {
      p.likes.forEach((like, idx) => {
        const chip = document.createElement('div');
        chip.className = 'chip';
        const span = document.createElement('span');
        span.textContent = like;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.setAttribute('aria-label', '削除');
        btn.textContent = '×';
        btn.addEventListener('click', () => {
          p.likes.splice(idx, 1);
          p.updatedAt = Date.now();
          savePeople();
          renderDetail();
        });
        chip.appendChild(span);
        chip.appendChild(btn);
        likesChips.appendChild(chip);
      });
    }

    photoGrid.innerHTML = '';
    p.photos.forEach((photo, idx) => {
      const item = document.createElement('div');
      item.className = 'photo-item';

      const img = document.createElement('img');
      img.src = photo;
      img.addEventListener('click', () => openLightbox(photo));

      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'photo-remove';
      removeBtn.setAttribute('aria-label', '削除');
      removeBtn.textContent = '×';
      removeBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (confirm('この写真を削除しますか？')) {
          p.photos.splice(idx, 1);
          p.updatedAt = Date.now();
          savePeople();
          renderDetail();
        }
      });

      item.appendChild(img);
      item.appendChild(removeBtn);
      photoGrid.appendChild(item);
    });

    const sortedTimeline = p.timeline
      .map((entry, idx) => ({ entry, idx }))
      .sort((a, b) => a.entry.year - b.entry.year || (parseInt(a.entry.detail, 10) || 0) - (parseInt(b.entry.detail, 10) || 0) || (parseInt(a.entry.day, 10) || 0) - (parseInt(b.entry.day, 10) || 0));

    timelineList.innerHTML = '';
    timelineEmpty.style.display = p.timeline.length === 0 ? 'block' : 'none';
    sortedTimeline.forEach(({ entry, idx }) => {
      const item = document.createElement('div');
      item.className = 'timeline-item';

      const dot = document.createElement('div');
      dot.className = 'timeline-dot';

      const textWrap = document.createElement('div');
      textWrap.className = 'timeline-vertical-text';

      const yearSpan = document.createElement('span');
      yearSpan.className = 'timeline-year';
      yearSpan.textContent = entry.year + '年' + (entry.detail ? entry.detail + '月' : '') + (entry.day ? entry.day + '日' : '');

      const titleSpan = document.createElement('span');
      titleSpan.className = 'timeline-title';
      titleSpan.textContent = entry.title;

      textWrap.appendChild(yearSpan);
      textWrap.appendChild(titleSpan);

      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'timeline-remove';
      removeBtn.setAttribute('aria-label', '削除');
      removeBtn.textContent = '×';
      removeBtn.addEventListener('click', () => {
        p.timeline.splice(idx, 1);
        p.updatedAt = Date.now();
        savePeople();
        renderDetail();
      });

      item.appendChild(dot);
      item.appendChild(textWrap);
      item.appendChild(removeBtn);
      timelineList.appendChild(item);
    });
    updateTimelineScrollbar();
  }

  function addLikeHandler() {
    const val = likeInput.value.trim();
    if (!val || !detailId) return;
    const p = people.find(x => x.id === detailId);
    if (!p) return;
    ensurePersonDefaults(p);
    p.likes.push(val);
    p.updatedAt = Date.now();
    likeInput.value = '';
    savePeople();
    renderDetail();
  }

  function addTimelineHandler() {
    const year = parseInt(timelineYearInput.value, 10);
    const title = timelineTitleInput.value.trim();
    if (!year || !title || !detailId) return;
    const p = people.find(x => x.id === detailId);
    if (!p) return;
    ensurePersonDefaults(p);
    p.timeline.push({
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
      year,
      detail: timelineDetailInput.value.trim(),
      day: timelineDayInput.value.trim(),
      title
    });
    p.updatedAt = Date.now();
    timelineYearInput.value = '';
    timelineDetailInput.value = '';
    timelineDayInput.value = '';
    timelineTitleInput.value = '';
    savePeople();
    renderDetail();
  }

  detailCloseBtn.addEventListener('click', closeDetail);
  detailOverlay.addEventListener('click', e => {
    if (e.target === detailOverlay) closeDetail();
  });

  detailEditBtn.addEventListener('click', () => {
    const id = detailId;
    returnToDetailAfterEdit = true;
    closeDetail();
    openEdit(id);
  });

  detailDeleteBtn.addEventListener('click', () => {
    if (!detailId) return;
    if (!confirm('この人物を削除しますか？')) return;
    markDeleted(detailId);
    people = people.filter(p => p.id !== detailId);
    savePeople();
    render();
    closeDetail();
  });

  addLikeBtn.addEventListener('click', addLikeHandler);
  likeInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addLikeHandler();
    }
  });

  addTimelineBtn.addEventListener('click', addTimelineHandler);
  timelineTitleInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addTimelineHandler();
    }
  });

  function updateTimelineScrollbar() {
    const trackWidth = timelineScrollbarTrack.clientWidth;
    const contentWidth = timelineList.scrollWidth;
    const visibleWidth = timelineList.clientWidth;
    if (trackWidth === 0 || contentWidth === 0) return;
    const ratio = Math.min(1, visibleWidth / contentWidth);
    const thumbWidth = Math.max(30, trackWidth * ratio);
    const maxScrollLeft = Math.max(0, contentWidth - visibleWidth);
    const scrollRatio = maxScrollLeft > 0 ? timelineList.scrollLeft / maxScrollLeft : 0;
    const maxThumbLeft = trackWidth - thumbWidth;
    timelineScrollbarThumb.style.width = thumbWidth + 'px';
    timelineScrollbarThumb.style.left = (maxThumbLeft * scrollRatio) + 'px';
  }

  timelineList.addEventListener('scroll', updateTimelineScrollbar);
  window.addEventListener('resize', updateTimelineScrollbar);

  let timelineDragging = false;
  let timelineDragStartX = 0;
  let timelineDragStartScrollLeft = 0;

  timelineScrollbarThumb.addEventListener('mousedown', e => {
    timelineDragging = true;
    timelineDragStartX = e.clientX;
    timelineDragStartScrollLeft = timelineList.scrollLeft;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!timelineDragging) return;
    const trackWidth = timelineScrollbarTrack.clientWidth;
    const contentWidth = timelineList.scrollWidth;
    const visibleWidth = timelineList.clientWidth;
    const maxScrollLeft = Math.max(0, contentWidth - visibleWidth);
    const deltaX = e.clientX - timelineDragStartX;
    const scrollDelta = trackWidth > 0 ? (deltaX / trackWidth) * contentWidth : 0;
    timelineList.scrollLeft = Math.max(0, Math.min(maxScrollLeft, timelineDragStartScrollLeft + scrollDelta));
  });

  document.addEventListener('mouseup', () => {
    timelineDragging = false;
  });

  timelineScrollbarTrack.addEventListener('click', e => {
    if (e.target === timelineScrollbarThumb) return;
    const rect = timelineScrollbarTrack.getBoundingClientRect();
    const clickRatio = (e.clientX - rect.left) / rect.width;
    const contentWidth = timelineList.scrollWidth;
    const visibleWidth = timelineList.clientWidth;
    const maxScrollLeft = Math.max(0, contentWidth - visibleWidth);
    timelineList.scrollLeft = clickRatio * maxScrollLeft;
  });

  detailFamilyInput.addEventListener('input', () => {
    if (!detailId) return;
    const p = people.find(x => x.id === detailId);
    if (!p) return;
    p.family = detailFamilyInput.value;
    p.updatedAt = Date.now();
    savePeople();
  });

  detailFamilyInput.addEventListener('blur', () => {
    if (!detailId) return;
    const p = people.find(x => x.id === detailId);
    if (!p) return;
    p.family = detailFamilyInput.value.trim();
    detailFamilyInput.value = p.family;
    p.updatedAt = Date.now();
    savePeople();
  });

  detailBirthOrderInput.addEventListener('change', () => {
    if (!detailId) return;
    const p = people.find(x => x.id === detailId);
    if (!p) return;
    p.birthOrder = detailBirthOrderInput.value;
    p.updatedAt = Date.now();
    savePeople();
  });

  addSiblingBtn.addEventListener('click', () => {
    if (!detailId) return;
    const p = people.find(x => x.id === detailId);
    if (!p) return;
    ensurePersonDefaults(p);
    p.siblings.push({
      type: siblingTypeInput.value,
      diff: siblingDiffInput.value.trim()
    });
    p.updatedAt = Date.now();
    siblingDiffInput.value = '';
    savePeople();
    renderDetail();
  });

  function openLightbox(src) {
    lightboxImg.src = src;
    lightboxOverlay.classList.add('open');
  }

  function closeLightbox() {
    lightboxOverlay.classList.remove('open');
    lightboxImg.src = '';
  }

  lightboxCloseBtn.addEventListener('click', closeLightbox);
  lightboxOverlay.addEventListener('click', e => {
    if (e.target === lightboxOverlay) closeLightbox();
  });

  addPhotoBtn.addEventListener('click', () => galleryInput.click());
  galleryInput.addEventListener('change', () => {
    const files = Array.from(galleryInput.files);
    if (!files.length || !detailId) return;
    const p = people.find(x => x.id === detailId);
    if (!p) return;
    ensurePersonDefaults(p);
    let remaining = files.length;
    files.forEach(file => {
      resizeImage(file, dataUrl => {
        p.photos.push(dataUrl);
        remaining--;
        if (remaining === 0) {
          p.updatedAt = Date.now();
          savePeople();
          renderDetail();
        }
      });
    });
    galleryInput.value = '';
  });

  render();
})();
</script>

</body>
</html>
